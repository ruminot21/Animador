<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animador PRO VIDEO</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:#fff;text-align:center;padding:16px}
canvas{max-width:100%;border-radius:12px;border:2px solid #333;background:#000}
.controls{margin:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
button,input,select{padding:10px;border-radius:8px;border:none}
button{background:#ff0055;color:#fff;cursor:pointer}
</style>
</head>

<body>

<h1>🎬 Animador PRO + VIDEO</h1>

<input type="file" id="upload" accept="image/*"><br><br>

<canvas id="canvas"></canvas>

<div class="controls">
<select id="mode">
<option value="waveV">🌊 Bandera Vertical</option>
<option value="rotate">🔄 Rotación</option>
<option value="zoom">🔍 Zoom</option>
<option value="float">☁️ Flotar</option>
</select>
</div>

<div class="controls">
Velocidad <input type="range" id="speed" min="0.2" max="5" step="0.1" value="1">
Intensidad <input type="range" id="intensity" min="1" max="50" value="20">
Duración <input type="range" id="duration" min="2" max="10" value="4">
</div>

<div class="controls">
<button onclick="recordVideo()">🎬 Descargar VIDEO</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();
let t = 0;
let loaded = false;

document.getElementById("upload").addEventListener("change", e=>{
 const file = e.target.files[0];
 img.src = URL.createObjectURL(file);
});

img.onload = ()=>{
 canvas.width = img.width;
 canvas.height = img.height;
 loaded = true;
 animate();
};

function animate(){
 requestAnimationFrame(animate);
 if(!loaded) return;

 let mode = document.getElementById("mode").value;
 let speed = document.getElementById("speed").value;
 let intensity = document.getElementById("intensity").value;

 t += 0.02 * speed;

 ctx.clearRect(0,0,canvas.width,canvas.height);

 if(mode==="waveV"){
  for(let x=0;x<canvas.width;x++){
   let offset = Math.sin(x*0.03+t)*intensity;
   ctx.drawImage(img,x,0,1,canvas.height,x,offset,1,canvas.height);
  }
 }

 else if(mode==="rotate"){
  ctx.save();
  ctx.translate(canvas.width/2,canvas.height/2);
  ctx.rotate(Math.sin(t)*0.5);
  ctx.drawImage(img,-img.width/2,-img.height/2);
  ctx.restore();
 }

 else if(mode==="zoom"){
  let scale = 1 + Math.sin(t)*0.2;
  ctx.save();
  ctx.translate(canvas.width/2,canvas.height/2);
  ctx.scale(scale,scale);
  ctx.drawImage(img,-img.width/2,-img.height/2);
  ctx.restore();
 }

 else if(mode==="float"){
  ctx.drawImage(img,0,Math.sin(t)*20);
 }
}

function recordVideo(){
 let stream = canvas.captureStream(30);
 let recorder = new MediaRecorder(stream);
 let chunks=[];

 recorder.ondataavailable=e=>chunks.push(e.data);

 recorder.onstop=()=>{
  let blob=new Blob(chunks,{type:"video/webm"});
  let url=URL.createObjectURL(blob);
  let a=document.createElement("a");
  a.href=url;
  a.download="animacion.webm";
  a.click();
 };

 recorder.start();

 let duration = document.getElementById("duration").value * 1000;
 setTimeout(()=>recorder.stop(), duration);
}
</script>

</body>
</html>
