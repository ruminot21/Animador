<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesero - Delicia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .heading-font { font-family: 'Playfair Display', sans-serif; }
    </style>
</head>
<body class="bg-stone-950 text-white">
    <div class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-amber-600 rounded-2xl flex items-center justify-center text-3xl">🧑‍🍽️</div>
                <div>
                    <h1 class="heading-font text-4xl font-bold">Mesero</h1>
                    <p class="text-amber-400">Pedidos Listos para Entregar</p>
                </div>
            </div>
            <button onclick="refreshOrders()" class="px-6 py-3 bg-stone-800 hover:bg-stone-700 rounded-2xl flex items-center gap-3">
                <i class="fa-solid fa-arrows-rotate"></i> Actualizar
            </button>
        </div>

        <div id="waiter-orders" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- JS populated -->
        </div>
    </div>

    <script>
        function loadOrders() {
            return JSON.parse(localStorage.getItem('restaurantOrders') || '[]');
        }

        function saveOrders(orders) {
            localStorage.setItem('restaurantOrders', JSON.stringify(orders));
        }

        function renderWaiterOrders() {
            const container = document.getElementById('waiter-orders');
            container.innerHTML = '';
            const orders = loadOrders().filter(o => o.stage === 'mesero' && o.status === 'ready');

            if (orders.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-20 text-stone-400 text-xl">No hay pedidos listos para entregar</div>`;
                return;
            }

            orders.forEach((order) => {
                const div = document.createElement('div');
                div.className = 'bg-stone-900 rounded-3xl p-8';
                let itemsHtml = order.items.map(item => `
                    <div class="py-1">${item.name} ×${item.quantity||1}</div>
                `).join('');

                div.innerHTML = `
                    <div class="flex justify-between mb-6">
                        <div>
                            <span class="inline-block bg-amber-600 text-white text-xs font-mono px-4 py-2 rounded-2xl">MESA ${order.table}</span>
                        </div>
                        <span class="text-xl font-semibold">$${order.total.toLocaleString()}</span>
                    </div>
                    <div class="mb-8 text-stone-300">${itemsHtml}</div>
                    <button onclick="markDelivered('${order.id}')" 
                            class="w-full py-6 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-lg font-medium flex items-center justify-center gap-3">
                        <i class="fa-solid fa-check"></i> Entregado a Mesa ${order.table}
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function markDelivered(orderId) {
            let orders = loadOrders();
            const index = orders.findIndex(o => o.id === orderId);
            
            if (index !== -1) {
                orders[index].status = 'completed';
                orders[index].stage = 'completed';
                saveOrders(orders);
                renderWaiterOrders();
                alert(`Pedido de Mesa ${orders[index].table} marcado como entregado.`);
            }
        }

        function refreshOrders() {
            renderWaiterOrders();
        }

        window.onload = function() {
            renderWaiterOrders();
            setInterval(renderWaiterOrders, 3000);
        };

        // Real-time sync
        window.addEventListener('storage', function(e) {
            if (e.key === 'restaurantOrders') {
                renderWaiterOrders();
            }
        });
    </script>
</body>
</html>
